<!-- Loading Spinner Component -->
<div class="loader-overlay" id="loaderOverlay" style="display: none;">
    <div class="loader-container">
        <div class="spinner"></div>
        <p class="loader-text">Loading...</p>
    </div>
</div>

<script>
    // Show loader
    function showLoader(message = 'Loading...') {
        const overlay = document.getElementById('loaderOverlay');
        if (overlay) {
            const textElement = overlay.querySelector('.loader-text');
            if (textElement) textElement.textContent = message;
            overlay.style.display = 'flex';
        }
    }
    
    // Hide loader
    function hideLoader() {
        const overlay = document.getElementById('loaderOverlay');
        if (overlay) {
            overlay.style.display = 'none';
        }
    }
    
    // Auto-hide after timeout (fallback)
    function hideLoaderWithTimeout(seconds = 10) {
        setTimeout(hideLoader, seconds * 1000);
    }
</script>

<style>
    .loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }
    
    .loader-container {
        background-color: var(--white);
        padding: var(--spacing-xl);
        border-radius: var(--border-radius-lg);
        text-align: center;
        min-width: 200px;
    }
    
    .loader-text {
        margin-top: var(--spacing-md);
        color: var(--dark);
    }
</style>
