           <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Commerce Sierra Leone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .register-card h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .register-card h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2e7d32;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #1b5e20;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .message.error {
            display: block;
            background: #ffebee;
            color: #f44336;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .links a {
            color: #2e7d32;
            text-decoration: none;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .strength-bar.weak { background: #f44336; width: 33%; }
        .strength-bar.medium { background: #ff9800; width: 66%; }
        .strength-bar.strong { background: #4caf50; width: 100%; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>🛍️ E-Commerce Sierra Leone</h1>
        <h2>Create Account</h2>
        <p class="subtitle">Join our community of local businesses</p>

        <div id="message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="john_doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••">
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" required placeholder="••••••">
            </div>

            <div class="form-group">
                <label for="role">Account Type</label>
                <select id="role">
                    <option value="customer">Customer - Shop and buy products</option>
                    <option value="admin">Admin - Full system access</option>
                </select>
            </div>

            <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/login.html">Login here</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000";

        function showMessage(message, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength < 2) strengthBar.className = 'strength-bar weak';
            else if (strength < 4) strengthBar.className = 'strength-bar medium';
            else strengthBar.className = 'strength-bar strong';
        });

        async function registerUser(username, email, password, role) {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password, role })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Registration successful! Welcome ${username}!`, "success");
                    setTimeout(() => {
                        window.location.href = "/login.html";
                    }, 1500);
                } else {
                    showMessage(data.detail || "Registration failed", "error");
                }
            } catch (error) {
                showMessage("Network error. Please try again.", "error");
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const role = document.getElementById('role').value;

            if (password !== confirmPassword) {
                showMessage("Passwords do not match!", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("Password must be at least 6 characters!", "error");
                return;
            }

            registerUser(username, email, password, role);
        });
    </script>
</body>

    <script>
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('passwordStrength');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const percentage = (strength / 5) * 100;
            strengthBar.style.width = percentage + '%';
            
            if (strength < 2) strengthBar.className = 'password-strength-bar weak';
            else if (strength < 4) strengthBar.className = 'password-strength-bar medium';
            else strengthBar.className = 'password-strength-bar strong';
        });
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const role = document.getElementById('role').value;
            
            if (password !== confirmPassword) {
                showMessage("Passwords do not match!", "error");
                return;
            }
            
            if (password.length < 6) {
                showMessage("Password must be at least 6 characters!", "error");
                return;
            }
            
            await registerUser(username, email, password, role);
        });
        
        // Redirect if already logged in
        if (isAuthenticated()) {
            const user = getCurrentUser();
            if (user?.role === 'admin') {
                window.location.href = '/dashboard.html';
            } else {
                window.location.href = '/products.html';
            }
        }
    </script>
