<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce Sierra Leone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-card h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2e7d32;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #1b5e20;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .message.error {
            display: block;
            background: #ffebee;
            color: #f44336;
            border-left: 4px solid #f44336;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .links a {
            color: #2e7d32;
            text-decoration: none;
        }

        .demo-box {
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
        }

        .demo-box p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🛍️ E-Commerce Sierra Leone</h1>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="admin@ecommerce.sl">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••">
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="links">
            <p>Don't have an account? <a href="/register.html">Register here</a></p>
        </div>

        <div class="demo-box">
            <p><strong>Demo Credentials:</strong></p>
            <p>Admin: admin@ecommerce.sl / Admin@123</p>
            <p>Customer: customer@example.com / 123456</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000";

        function showMessage(message, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        async function loginUser(email, password) {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("access_token", data.access_token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    showMessage(`Welcome back, ${data.user.username}!`, "success");

                    setTimeout(() => {
                        if (data.user.role === "admin") {
                            window.location.href = "/dashboard.html";
                        } else {
                            window.location.href = "/products.html";
                        }
                    }, 1000);
                } else {
                    showMessage(data.detail || "Invalid email or password", "error");
                }
            } catch (error) {
                showMessage("Network error. Please try again.", "error");
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            loginUser(email, password);
        });

        // Check if already logged in
        const token = localStorage.getItem("access_token");
        const user = localStorage.getItem("user");
        if (token && user) {
            const userData = JSON.parse(user);
            if (userData.role === "admin") {
                window.location.href = "/dashboard.html";
            } else {
                window.location.href = "/products.html";
            }
        }
    </script>
</body>
</html>
